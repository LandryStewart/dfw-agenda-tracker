name: Scrape DFW Agendas

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper.py

      - name: Commit results
        run: |
          git config user.name "Agenda Bot"
          git config user.email "actions@github.com"
          git add agenda_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update agenda data $(date +'%Y-%m-%d %H:%M')" && git push)
