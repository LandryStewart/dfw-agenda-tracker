
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFW Municipal Agenda Tracker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary: #1a3a5c;
            --primary-light: #2a5a8c;
            --accent: #e8a838;
            --accent-hover: #d4952e;
            --bg: #f0f2f5;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --success: #27ae60;
            --danger: #e74c3c;
            --border: #dfe6e9;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, Segoe UI, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 20px;
        }

        .nav-tabs {
            display: flex;
            background: white;
            border-bottom: 2px solid var(--border);
        }

        .nav-tab {
            padding: 14px 20px;
            cursor: pointer;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            color: var(--text-light);
        }

        .nav-tab.active {
            color: var(--primary);
            border-bottom-color: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .county-header {
            background: var(--primary);
            color: white;
            padding: 12px 18px;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .county-body {
            background: white;
            border: 1px solid var(--border);
        }

        .muni-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 18px;
            border-top: 1px solid var(--border);
        }

        .link-btn {
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .pz { background: #e8f4fd; color: #2980b9; }
        .cc { background: #fdf2e8; color: #d4952e; }
        .track { background: #e8fdf0; color: #27ae60; border: none; cursor: pointer; }
    </style>
</head>

<body>

<div class="header">
    <h2>🏙️ DFW Municipal Agenda Tracker</h2>
    <p>Single Family Residential — P&Z & City Council</p>
</div>

<div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab('browse', this)">Browse</div>
    <div class="nav-tab" onclick="switchTab('autoscan', this)">Auto‑Scan</div>
    <div class="nav-tab" onclick="switchTab('tracker', this)">Tracker</div>
</div>

<div class="container">

    <div id="tab-browse" class="tab-content active">
        <div id="cityList"></div>
    </div>

    <div id="tab-autoscan" class="tab-content">
        <p>Auto-scan results will load here once agenda_data.json exists.</p>
    </div>

    <div id="tab-tracker" class="tab-content">
        <p>Tracker tab ready.</p>
    </div>

</div>

<script>
const municipalities = [
    {name:"Arlington",county:"Tarrant",pz:"https://www.arlingtontx.gov",cc:"https://www.arlingtontx.gov"},
    {name:"Fort Worth",county:"Tarrant",pz:"https://fortworthtexas.legistar.com",cc:"https://fortworthtexas.legistar.com"},
    {name:"Mansfield",county:"Tarrant",pz:"https://www.mansfieldtexas.gov",cc:"https://www.mansfieldtexas.gov"}
];

function switchTab(tab, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    el.classList.add('active');
}

function renderCities() {
    const container = document.getElementById('cityList');
    let html = '';
    const grouped = {};

    municipalities.forEach(m => {
        if (!grouped[m.county]) grouped[m.county] = [];
        grouped[m.county].push(m);
    });

    Object.keys(grouped).forEach(county => {
        html += `<div class="county-header">${county} County</div><div class="county-body">`;
        grouped[county].forEach(m => {
            html += `
                <div class="muni-row">
                    <strong>${m.name}</strong>
                    <div>
                        <a class="link-btn pz" href="${m.pz}" target="_blank">P&Z</a>
                        <a class="link-btn cc" href="${m.cc}" target="_blank">Council</a>
                    </div>
                </div>`;
        });
        html += `</div>`;
    });

    container.innerHTML = html;
}

renderCities();
</script>

</body>
</html>
